name = "ios-location-spoofer-web"
compatibility_date = "2024-03-20"
pages_build_output_dir = "public"

# The following configuration is used for local development via `wrangler pages dev`
# When deploying to Cloudflare Pages, make sure to bind the KV namespace 'SPOOFER_DATA' in the dashboard.
[[kv_namespaces]]
binding = "SPOOFER_DATA"
id = "local-dev-id"
preview_id = "local-preview-id"

[vars]
# Configure these variables in your Cloudflare Pages dashboard for production.
# TOKEN = "your-secure-token"
# AMAP_KEY = "your-amap-web-js-api-key"
